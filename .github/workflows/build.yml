name: Build Custom MicroPython
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc git wget flex bison gperf python3 \
            python3-pip python3-venv cmake ninja-build libffi-dev libssl-dev

      - name: Init ESP-IDF submodule
        run: |
          git submodule init
          git submodule update lib/esp-idf

      - name: Init port submodules
        run: make -C ports/esp32 BOARD=ESP32_GENERIC_C3 submodules

      - name: Install ESP-IDF tools
        run: |
          cd lib/esp-idf
          ./install.sh esp32c3

      - name: Build mpy-cross
        run: make -C mpy-cross

      - name: Build firmware
        run: |
          . lib/esp-idf/export.sh
          make -C ports/esp32 BOARD=ESP32_GENERIC_C3

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ports/esp32/build-ESP32_GENERIC_C3/firmware.bin
